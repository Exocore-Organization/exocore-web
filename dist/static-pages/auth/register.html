<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title class="notranslate" translate="no">Create account · Exocore</title>
<link rel="icon" type="image/png" href="/exocore/exo-icon.png">
<!-- Per-theme structural visual overlays (scoped to html[data-theme="<id>"]). -->
<link rel="stylesheet" href="/exocore/_shared/exo-theme-skins.css">
<script>
(function () {
    try {
        var t = localStorage.getItem('exo:theme') || '';
    } catch (_) {}
})();
/* Pre-paint theme bootstrap — stamps data-theme, restores CSS vars, handles Aero. */
(function () {
    try {
        var html = document.documentElement;
        var id = localStorage.getItem('exo:theme') || '';
        if (id) html.dataset.theme = id;
        try {
            var vars = JSON.parse(localStorage.getItem('exo:theme-vars') || 'null');
            if (vars) {
                var cs = vars['color-scheme'];
                if (cs) html.style.setProperty('color-scheme', cs);
                var keys = Object.keys(vars);
                for (var i = 0; i < keys.length; i++) {
                    var k = keys[i];
                    if (k !== 'color-scheme' && vars[k]) html.style.setProperty(k, vars[k]);
                }
            }
        } catch (_) {}
        if (['frutiger-aero'].indexOf(id) !== -1) {
            html.dataset.mode = 'aero';
            html.classList.add('exo-booting');
            var t = setTimeout(function () { html.classList.remove('exo-booting'); }, 500);
            var l = document.createElement('link');
            l.rel = 'stylesheet';
            l.href = '/exocore/_shared/exo-frutiger-aero.css';
            l.setAttribute('data-exo-aero', '1');
            l.onload = function () { clearTimeout(t); html.classList.remove('exo-booting'); };
            l.onerror = function () { clearTimeout(t); html.classList.remove('exo-booting'); };
            document.head.appendChild(l);
        }
    } catch (e) {
        try { document.documentElement.classList.remove('exo-booting'); } catch (_) {}
    }
})();
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<style>
          html.exo-booting body { visibility: hidden !important; }
:root {
    --font-ui:   'IBM Plex Sans', system-ui, sans-serif;
    --font-mono: 'IBM Plex Mono', monospace;
    /* See note in home.html — first-paint fallbacks only;
     * exo-theme-apply.js inline-styles on <html> override
     * these. Accent wired to theme so EXOCORE wordmark, NEXT
     * button, focus ring, step pips, etc. follow the picked
     * theme. `--green` stays a real green because the wizard
     * uses it as the success indicator on the avatar/cover
     * upload steps. */
    --bg-base:   #0a0a0a;
    --bg-surf:   #111;
    --text-pri:  #f0f0f0;
    --text-sec:  #a0a0a0;
    --text-mut:  #666;
    --yellow:    var(--accent, #FFE500);
    --green:     #43d473;
    --pink:      var(--accent, #FF2D78);
    --cyan:      var(--accent, #00D4FF);
    --red:       #ff5555;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: var(--font-ui);
    background: var(--bg-base);
    color: var(--text-pri);
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
    line-height: 1.5;
  }

  .auth-page {
    position: relative; min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 1.5rem; overflow: hidden;
  }
  .auth-glow {
    position: absolute; border-radius: 50%; filter: blur(120px);
    pointer-events: none; z-index: 0;
  }
  .auth-glow-1 { width: 420px; height: 420px; background: rgba(255,229,0,0.06); top: -120px; left: -100px; }
  .auth-glow-2 { width: 360px; height: 360px; background: rgba(0,212,255,0.05); bottom: -100px; right: -80px; }

  .auth-card {
    position: relative; z-index: 1;
    width: 100%; max-width: 480px;
    background: var(--bg-surf); border: 2px solid var(--border, #333);
    box-shadow: 6px 6px 0 0 var(--yellow);
    padding: 1.75rem;
    display: flex; flex-direction: column; gap: 1.25rem;
    animation: fadeUp 0.3s ease both;
  }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes spin   { to { transform: rotate(360deg); } }

  .auth-logo-text {
    font-size: 0.85rem; font-weight: 800; letter-spacing: 0.2em;
    color: var(--yellow); font-family: var(--font-mono); text-transform: uppercase;
  }
  .auth-title {
    font-size: 1.65rem; font-weight: 800; color: var(--text-pri);
    line-height: 1.15; letter-spacing: -0.01em;
  }
  .auth-subtitle { font-size: 0.85rem; color: var(--text-sec); margin-top: 0.35rem; }

  /* ---- Stepper ---- */
  .reg-progress { display: flex; gap: 6px; }
  .reg-progress-bar {
    flex: 1; height: 4px; background: #222;
    transition: background 0.25s ease;
  }
  .reg-progress-bar.active { background: var(--yellow); }
  .reg-step-labels {
    display: flex; justify-content: space-between;
    font-size: 0.62rem; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--text-mut); font-weight: 700; margin-top: 0.4rem;
  }
  .reg-step-labels span.active { color: var(--yellow); }

  /* ---- Form primitives ---- */
  .form-stack { display: flex; flex-direction: column; gap: 1rem; }
  /* `display: flex` above clobbers the user-agent `[hidden] { display: none }`
     rule, which broke step gating (all steps were stacked). Restore it. */
  [hidden] { display: none !important; }
  .field      { display: flex; flex-direction: column; gap: 0.3rem; }
  .field-label {
    font-size: 0.72rem; font-weight: 700; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--text-mut);
  }
  .field-label .opt { text-transform: none; color: var(--text-mut); font-weight: 400; letter-spacing: 0; margin-left: 6px; }
  .field-input, textarea.field-input {
    width: 100%; background: var(--bg-base, #0a0a0a); border: 2px solid var(--border, #333);
    padding: 0.7rem 0.9rem; font-size: 0.9rem;
    color: var(--text-pri); outline: none;
    transition: 0.1s ease; font-family: var(--font-ui);
  }
  .field-input::placeholder { color: var(--text-muted, #444); }
  .field-input:hover  { border-color: var(--border-strong, #555); }
  .field-input:focus  { border-color: var(--yellow); box-shadow: 3px 3px 0 var(--yellow); }
  .field-input.error  { border-color: var(--red);    box-shadow: 3px 3px 0 var(--red); }
  textarea.field-input { resize: none; min-height: 90px; line-height: 1.6; font-family: var(--font-ui); }

  .pass-wrap { position: relative; }
  .pass-wrap .field-input { padding-right: 2.6rem; }
  .pass-toggle {
    position: absolute; right: 0.5rem; top: 50%;
    transform: translateY(-50%);
    background: transparent; border: none; color: var(--text-mut);
    cursor: pointer; padding: 0.4rem;
    display: flex; align-items: center; justify-content: center;
  }
  .pass-toggle:hover { color: var(--yellow); }

  /* ---- Password strength ---- */
  .reg-strength {
    display: flex; align-items: center; gap: 8px;
    font-size: 0.72rem; font-weight: 600;
    margin-top: 0.4rem;
  }
  .reg-strength-track { flex: 1; height: 4px; background: var(--bg-card, #222); overflow: hidden; }
  .reg-strength-fill  { height: 100%; transition: width 0.2s ease, background 0.2s ease; }

  /* ---- Country picker ---- */
  .reg-country-list {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 4px; max-height: 220px; overflow-y: auto;
    border: 2px solid var(--border, #222); padding: 6px; background: var(--bg-base, #0a0a0a);
  }
  .reg-country-item {
    text-align: left; padding: 0.45rem 0.6rem;
    background: transparent; border: 1px solid transparent;
    color: var(--text-sec); font-size: 0.78rem; font-family: var(--font-ui);
    cursor: pointer;
  }
  .reg-country-item:hover { border-color: var(--yellow); color: var(--yellow); }
  .reg-country-clear {
    align-self: flex-start; margin-top: 0.4rem;
    background: transparent; border: none; color: var(--text-mut);
    font-size: 0.75rem; cursor: pointer; padding: 0;
  }
  .reg-country-clear:hover { color: var(--yellow); }

  /* ---- Avatar / Cover pickers ---- */
  .reg-avatar-pick {
    display: flex; flex-direction: column; align-items: center; gap: 0.7rem;
    width: 100%;
  }
  .reg-avatar-preview {
    width: 110px; height: 110px;
    border: 2px solid var(--border, #333); background: var(--bg-card, #1a1a1a);
    background-size: cover; background-position: center;
    color: var(--yellow); font-size: 2.4rem; font-weight: 800;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 4px 4px 0 var(--yellow);
  }
  .reg-cover-preview {
    width: 100%; height: 130px;
    border: 2px solid var(--border, #333);
    background-size: cover; background-position: center;
    background: linear-gradient(135deg, var(--bg-elev, #1c1c1c), var(--bg-base, #0a0a0a));
    display: flex; align-items: center; justify-content: center;
    color: var(--text-mut); font-size: 0.78rem;
  }
  .reg-file-btn {
    display: inline-flex; align-items: center; justify-content: center;
    cursor: pointer; padding: 0.65rem 1rem;
    background: var(--bg-card, #1a1a1a); border: 2px solid var(--border, #333); color: var(--text-pri);
    font-size: 0.78rem; font-weight: 700; letter-spacing: 0.08em;
    text-transform: uppercase; transition: 0.1s ease;
  }
  .reg-file-btn:hover  { border-color: var(--yellow); color: var(--yellow); box-shadow: 3px 3px 0 var(--yellow); }
  .reg-file-btn input  { display: none; }
  .reg-link-btn {
    background: transparent; border: none; color: var(--text-mut);
    font-size: 0.75rem; cursor: pointer; padding: 0;
    text-decoration: underline; text-underline-offset: 3px;
  }
  .reg-link-btn:hover  { color: var(--yellow); }
  .reg-hint    { font-size: 0.74rem; color: var(--text-mut); text-align: center; }
  .reg-hint.ok { color: var(--green); }

  /* ---- Buttons + nav ---- */
  .btn {
    width: 100%; display: inline-flex; align-items: center; justify-content: center;
    gap: 8px; padding: 0.85rem 1rem;
    font-size: 0.82rem; font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase;
    cursor: pointer; border: 2px solid #000;
    transition: 0.1s ease; font-family: var(--font-ui);
  }
  .btn-primary { background: var(--yellow); color: #000; box-shadow: 4px 4px 0 0 #000; }
  .btn-primary:hover:not(:disabled)  { transform: translate(-2px, -2px); box-shadow: 6px 6px 0 0 #000; }
  .btn-primary:active:not(:disabled) { transform: translate(2px, 2px);   box-shadow: 2px 2px 0 0 #000; }
  .btn-primary:disabled { opacity: 0.6; cursor: wait; }
  .btn-secondary {
    background: #1a1a1a; color: var(--text-pri); border-color: #333;
  }
  .btn-secondary:hover:not(:disabled)  { border-color: var(--yellow); color: var(--yellow); }
  .btn-secondary:disabled { opacity: 0.5; cursor: not-allowed; }

  .reg-nav { display: flex; gap: 0.6rem; margin-top: 0.5rem; }
  .reg-nav .btn { flex: 1; }

  .form-error, .form-success {
    display: flex; align-items: center; gap: 8px;
    padding: 0.65rem 0.85rem; font-size: 0.82rem; font-weight: 600;
    border: 2px solid;
  }
  .form-error   { background: rgba(255, 60, 60, 0.08); border-color: #d44; color: #ff8a8a; }
  .form-success { background: rgba(67, 212, 115, 0.08); border-color: var(--green); color: var(--green); }

  .spinner { width: 14px; height: 14px; border: 2px solid rgba(0,0,0,0.25); border-top-color: #000; border-radius: 50%; animation: spin 0.7s linear infinite; display: inline-block; }
  .spinner.lt { border-color: rgba(255,255,255,0.25); border-top-color: #fff; }

  .auth-footer {
    padding-top: 1rem; margin-top: 0.25rem;
    border-top: 1px solid #222; text-align: center;
    color: var(--text-mut); font-size: 0.85rem;
  }
  .auth-footer a { color: var(--yellow); font-weight: 700; text-decoration: none; }
  .auth-footer a:hover { text-decoration: underline; }

  @media (max-width: 480px) {
    .auth-page { padding: 0; align-items: stretch; }
    .auth-card {
      max-width: 100%; min-height: 100vh;
      box-shadow: none; border: none; border-bottom: 4px solid var(--yellow);
      padding: 1.25rem; justify-content: flex-start;
    }
    .btn { padding: 1rem; min-height: 52px; }
    .reg-country-list { grid-template-columns: 1fr; }
    .reg-step-labels span:not(.active) { display: none; }
  }

  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg-elev, #111); }
  ::-webkit-scrollbar-thumb { background: var(--bg-card, #333); border: 1px solid var(--border, #000); }
  ::-webkit-scrollbar-thumb:hover { background: var(--yellow); }
</style>
<script src="/exocore/_shared/vendor/msgpack.min.js"></script>
<!-- Phase 3.M: ExoStorage (IndexedDB-backed sync KV) MUST load
     before exo-rpc.js so the RPC client can read the auth token
     out of IDB instead of localStorage. -->
<script src="/exocore/_shared/exo-storage.js"></script>
<script src="/exocore/_shared/exo-rpc.js"></script>
<script src="/exocore/editor/scripts/themes.js"></script>
<script src="/exocore/_shared/exo-theme-apply.js"></script>
</head>
<body class="theme-modern">

<div class="auth-page">
  <div class="auth-glow auth-glow-1"></div>
  <div class="auth-glow auth-glow-2"></div>

  <div class="auth-card">
    <span class="auth-logo-text">EXOCORE</span>

    <div>
      <h1 class="auth-title">Create your account</h1>
      <p class="auth-subtitle" id="step-subtitle">Step 1 of 5 — Account</p>
    </div>

    <div class="reg-progress" aria-label="progress">
      <span class="reg-progress-bar active" data-bar="0"></span>
      <span class="reg-progress-bar"        data-bar="1"></span>
      <span class="reg-progress-bar"        data-bar="2"></span>
      <span class="reg-progress-bar"        data-bar="3"></span>
      <span class="reg-progress-bar"        data-bar="4"></span>
    </div>
    <div class="reg-step-labels">
      <span data-lbl="0" class="active">Account</span>
      <span data-lbl="1">About you</span>
      <span data-lbl="2">Where</span>
      <span data-lbl="3">Avatar</span>
      <span data-lbl="4">Cover</span>
    </div>

    <form id="reg-form" class="form-stack" novalidate>

      <!-- Step 0: Account -->
      <section data-step="0" class="form-stack">
        <div class="field">
          <label class="field-label" for="user">Username</label>
          <input id="user" name="user" class="field-input" type="text"
                 placeholder="@yourname" autocomplete="username" autofocus />
        </div>
        <div class="field">
          <label class="field-label" for="email">Email</label>
          <input id="email" name="email" class="field-input" type="email"
                 placeholder="you@example.com" autocomplete="email" />
        </div>
        <div class="field">
          <label class="field-label" for="pass">Password</label>
          <div class="pass-wrap">
            <input id="pass" name="pass" class="field-input" type="password"
                   placeholder="Min. 10 chars, mix Aa1!" autocomplete="new-password" />
            <button type="button" class="pass-toggle" data-target="pass" aria-label="Show password" tabindex="-1">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
          <div class="reg-strength" id="strength-row" style="display:none;">
            <div class="reg-strength-track"><div class="reg-strength-fill" id="strength-fill"></div></div>
            <span id="strength-label"></span>
          </div>
        </div>
        <div class="field">
          <label class="field-label" for="confirmPass">Confirm Password</label>
          <div class="pass-wrap">
            <input id="confirmPass" name="confirmPass" class="field-input" type="password"
                   placeholder="Repeat password" autocomplete="new-password" />
            <button type="button" class="pass-toggle" data-target="confirmPass" aria-label="Show password" tabindex="-1">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>
      </section>

      <!-- Step 1: About you -->
      <section data-step="1" class="form-stack" hidden>
        <div class="field">
          <label class="field-label" for="nickname">Nickname</label>
          <input id="nickname" name="nickname" class="field-input" type="text"
                 placeholder="What should we call you?" />
        </div>
        <div class="field">
          <label class="field-label" for="bio">Short bio <span class="opt">(optional)</span></label>
          <textarea id="bio" name="bio" class="field-input" rows="3" maxlength="280"
                    placeholder="A line or two about yourself…"></textarea>
          <span style="font-size:0.7rem;color:var(--text-mut);align-self:flex-end;" id="bio-count">0/280</span>
        </div>
      </section>

      <!-- Step 2: Where & when -->
      <section data-step="2" class="form-stack" hidden>
        <div class="field">
          <label class="field-label" for="dob">Date of birth</label>
          <input id="dob" name="dob" class="field-input" type="date" />
        </div>
        <div class="field">
          <label class="field-label">
            Country
            <span id="detect-hint" class="opt" style="display:none;">· detecting…</span>
          </label>
          <input id="country-search" class="field-input" type="text" placeholder="Search country…" />
          <div id="country-list" class="reg-country-list"></div>
          <button type="button" class="reg-country-clear" id="country-clear" hidden>✕ Change</button>
          <input type="hidden" id="country" name="country" />
        </div>
      </section>

      <!-- Step 3: Avatar -->
      <section data-step="3" class="form-stack" hidden>
        <div class="field" style="align-items:center;">
          <label class="field-label" style="align-self:flex-start;">Avatar (optional)</label>
          <div class="reg-avatar-pick">
            <div id="avatar-preview" class="reg-avatar-preview">?</div>
            <label class="reg-file-btn" id="avatar-btn">
              <input type="file" accept="image/*" id="avatar-input" />
              <span id="avatar-btn-label">Choose avatar</span>
            </label>
            <button type="button" class="reg-link-btn" id="avatar-remove" hidden>Remove</button>
            <p class="reg-hint" id="avatar-status">You can change this any time. Max 5&nbsp;MB.</p>
          </div>
        </div>
      </section>

      <!-- Step 4: Cover -->
      <section data-step="4" class="form-stack" hidden>
        <div class="field">
          <label class="field-label">Cover photo (optional)</label>
          <div id="cover-preview" class="reg-cover-preview"><span>Cover preview</span></div>
          <label class="reg-file-btn" id="cover-btn" style="margin-top:0.6rem;">
            <input type="file" accept="image/*" id="cover-input" />
            <span id="cover-btn-label">Choose cover</span>
          </label>
          <button type="button" class="reg-link-btn" id="cover-remove" hidden>Remove</button>
          <p class="reg-hint" id="cover-status">Max 5&nbsp;MB.</p>
        </div>
      </section>

      <div id="form-error" class="form-error" style="display:none;">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" style="flex-shrink:0;"><circle cx="7" cy="7" r="6" stroke="currentColor" stroke-width="1.5"/><path d="M7 4v3M7 9.5v.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        <span id="form-error-text"></span>
      </div>

      <div class="reg-nav">
        <button type="button" class="btn btn-secondary" id="btn-back" disabled>← Back</button>
        <button type="button" class="btn btn-primary"   id="btn-next">Next →</button>
        <button type="submit" class="btn btn-primary"   id="btn-submit" hidden>
          <span id="submit-label">Create Account</span>
        </button>
      </div>
    </form>

    <div class="auth-footer">
      Already have an account?
      <a href="/exocore/login">Sign in</a>
    </div>
  </div>
</div>

<script>
  (function () {
    /* Phase 3.M: defer the boot until the IndexedDB cache is
     * hydrated (and any legacy localStorage keys migrated). The
     * heavy multi-step register form below is only wired up
     * after we know the user isn't already signed in. */
    window.ExoStorage.ready.then(function () { boot(); });

    function boot() {
    // ---- Theme + already-logged-in redirect ----
    try {
      var settings = JSON.parse(ExoStorage.getItem('exo_settings') || '{}');
      if (!settings.theme) {
        settings.theme = 'modern';
        ExoStorage.setItem('exo_settings', JSON.stringify(settings));
      }
      document.body.className = 'theme-' + (settings.theme || 'modern');
      if (ExoStorage.getItem('exo_token')) {
        window.location.replace('/exocore/dashboard');
        return;
      }
    } catch (e) { console.error('init failed:', e); }

    // ---- Condensed country list (~190 names) ----
    var COUNTRIES = ["Afghanistan","Albania","Algeria","Andorra","Angola","Antigua and Barbuda","Argentina","Armenia","Australia","Austria","Azerbaijan","Bahamas","Bahrain","Bangladesh","Barbados","Belarus","Belgium","Belize","Benin","Bhutan","Bolivia","Bosnia and Herzegovina","Botswana","Brazil","Brunei","Bulgaria","Burkina Faso","Burundi","Cambodia","Cameroon","Canada","Cape Verde","Central African Republic","Chad","Chile","China","Colombia","Comoros","Congo","Congo (DRC)","Costa Rica","Côte d'Ivoire","Croatia","Cuba","Cyprus","Czechia","Denmark","Djibouti","Dominica","Dominican Republic","Ecuador","Egypt","El Salvador","Equatorial Guinea","Eritrea","Estonia","Eswatini","Ethiopia","Fiji","Finland","France","Gabon","Gambia","Georgia","Germany","Ghana","Greece","Grenada","Guatemala","Guinea","Guinea-Bissau","Guyana","Haiti","Honduras","Hong Kong","Hungary","Iceland","India","Indonesia","Iran","Iraq","Ireland","Israel","Italy","Jamaica","Japan","Jordan","Kazakhstan","Kenya","Kiribati","Kuwait","Kyrgyzstan","Laos","Latvia","Lebanon","Lesotho","Liberia","Libya","Liechtenstein","Lithuania","Luxembourg","Madagascar","Malawi","Malaysia","Maldives","Mali","Malta","Marshall Islands","Mauritania","Mauritius","Mexico","Micronesia","Moldova","Monaco","Mongolia","Montenegro","Morocco","Mozambique","Myanmar","Namibia","Nauru","Nepal","Netherlands","New Zealand","Nicaragua","Niger","Nigeria","North Korea","North Macedonia","Norway","Oman","Pakistan","Palau","Palestine","Panama","Papua New Guinea","Paraguay","Peru","Philippines","Poland","Portugal","Qatar","Romania","Russia","Rwanda","Saint Kitts and Nevis","Saint Lucia","Saint Vincent and the Grenadines","Samoa","San Marino","Sao Tome and Principe","Saudi Arabia","Senegal","Serbia","Seychelles","Sierra Leone","Singapore","Slovakia","Slovenia","Solomon Islands","Somalia","South Africa","South Korea","South Sudan","Spain","Sri Lanka","Sudan","Suriname","Sweden","Switzerland","Syria","Taiwan","Tajikistan","Tanzania","Thailand","Timor-Leste","Togo","Tonga","Trinidad and Tobago","Tunisia","Turkey","Turkmenistan","Tuvalu","Uganda","Ukraine","United Arab Emirates","United Kingdom","United States","Uruguay","Uzbekistan","Vanuatu","Vatican City","Venezuela","Vietnam","Yemen","Zambia","Zimbabwe"];

    var STEP_TITLES = ['Account', 'About you', 'Where & when', 'Avatar', 'Cover photo'];
    var TOTAL_STEPS = 5;
    var step = 0;

    var form     = document.getElementById('reg-form');
    var subtitle = document.getElementById('step-subtitle');
    var bars     = document.querySelectorAll('.reg-progress-bar');
    var lbls     = document.querySelectorAll('.reg-step-labels span');
    var errorBox = document.getElementById('form-error');
    var errorText= document.getElementById('form-error-text');
    var btnBack  = document.getElementById('btn-back');
    var btnNext  = document.getElementById('btn-next');
    var btnSub   = document.getElementById('btn-submit');
    var subLbl   = document.getElementById('submit-label');

    var avatarFile = null, coverFile = null;
    var avatarStatus = 'idle', coverStatus = 'idle'; // idle | processing | ready | error
    var MAX_BYTES = 5 * 1024 * 1024;

    // ---- DOB max = today ----
    document.getElementById('dob').max = new Date().toISOString().split('T')[0];

    // ---- Bio counter ----
    var bio = document.getElementById('bio');
    var bioCount = document.getElementById('bio-count');
    bio.addEventListener('input', function () { bioCount.textContent = bio.value.length + '/280'; });

    // ---- Password show/hide toggles ----
    document.querySelectorAll('.pass-toggle').forEach(function (btn) {
      btn.addEventListener('click', function () {
        var target = document.getElementById(btn.dataset.target);
        target.type = target.type === 'password' ? 'text' : 'password';
        btn.style.color = target.type === 'text' ? 'var(--yellow)' : '';
      });
    });

    // ---- Password strength ----
    var passEl  = document.getElementById('pass');
    var sRow    = document.getElementById('strength-row');
    var sFill   = document.getElementById('strength-fill');
    var sLabel  = document.getElementById('strength-label');
    var TIERS   = [
      { label: 'Too weak',  color: '#d44'    },
      { label: 'Weak',      color: '#e88'    },
      { label: 'Fair',      color: '#e0a043' },
      { label: 'Good',      color: '#9bd048' },
      { label: 'Strong',    color: '#43d473' },
      { label: 'Excellent', color: '#43d473' },
    ];
    function strength(pw) {
      var s = 0;
      if (pw.length >= 10) s++;
      if (pw.length >= 14) s++;
      if (/[a-z]/.test(pw) && /[A-Z]/.test(pw)) s++;
      if (/\d/.test(pw)) s++;
      if (/[^A-Za-z0-9]/.test(pw)) s++;
      var t = TIERS[Math.min(s, TIERS.length - 1)];
      return { score: s, label: t.label, color: t.color };
    }
    passEl.addEventListener('input', function () {
      var v = passEl.value;
      if (!v) { sRow.style.display = 'none'; return; }
      var s = strength(v);
      sRow.style.display = 'flex';
      sFill.style.width = (s.score / 5 * 100) + '%';
      sFill.style.background = s.color;
      sLabel.textContent = s.label;
      sLabel.style.color = s.color;
    });
    function validatePassword(pw) {
      if (!pw) return 'Password is required.';
      if (pw.length < 10) return 'Password must be at least 10 characters.';
      if (!/[a-z]/.test(pw)) return 'Add a lowercase letter.';
      if (!/[A-Z]/.test(pw)) return 'Add an uppercase letter.';
      if (!/\d/.test(pw)) return 'Add a number.';
      if (!/[^A-Za-z0-9]/.test(pw)) return 'Add a symbol (e.g. !@#$%).';
      if (/\s/.test(pw)) return 'No spaces allowed.';
      return '';
    }

    // ---- Country picker ----
    var countrySearch = document.getElementById('country-search');
    var countryList   = document.getElementById('country-list');
    var countryHidden = document.getElementById('country');
    var countryClear  = document.getElementById('country-clear');
    var detectHint    = document.getElementById('detect-hint');
    var detected      = false;

    function renderCountries(q) {
      countryList.innerHTML = '';
      var qq = (q || '').toLowerCase();
      var results = qq
        ? COUNTRIES.filter(function (c) { return c.toLowerCase().includes(qq); }).slice(0, 12)
        : COUNTRIES.slice(0, 12);
      if (results.length === 0) {
        var span = document.createElement('span');
        span.style.cssText = 'color:var(--text-mut);font-size:0.8rem;padding:0.4rem;';
        span.textContent = 'No matches';
        countryList.appendChild(span);
        return;
      }
      results.forEach(function (name) {
        var btn = document.createElement('button');
        btn.type = 'button'; btn.className = 'reg-country-item'; btn.textContent = name;
        btn.addEventListener('click', function () {
          countryHidden.value = name;
          countrySearch.value = name;
          countryList.style.display = 'none';
          countryClear.hidden = false;
        });
        countryList.appendChild(btn);
      });
    }
    countrySearch.addEventListener('input', function () {
      countryHidden.value = '';
      countryClear.hidden = true;
      countryList.style.display = '';
      renderCountries(countrySearch.value);
    });
    countryClear.addEventListener('click', function () {
      countryHidden.value = '';
      countrySearch.value = '';
      countryClear.hidden = true;
      countryList.style.display = '';
      renderCountries('');
    });
    function tryDetectCountry() {
      if (detected || countryHidden.value) return;
      detected = true;
      detectHint.style.display = '';
      fetch('https://ipapi.co/json/', { signal: AbortSignal.timeout ? AbortSignal.timeout(4000) : undefined })
        .then(function (r) { return r.json(); })
        .then(function (data) {
          var name = data && data.country_name;
          if (!name) return;
          var hit = COUNTRIES.find(function (c) { return c.toLowerCase() === String(name).toLowerCase(); });
          if (hit) {
            countryHidden.value = hit;
            countrySearch.value = hit;
            countryList.style.display = 'none';
            countryClear.hidden = false;
          }
        })
        .catch(function () {})
        .finally(function () { detectHint.style.display = 'none'; });
    }

    // ---- Image picker (avatar / cover) ----
    function pickImage(input, kind) {
      var file = input.files && input.files[0];
      var setStatus = function (s) { kind === 'avatar' ? (avatarStatus = s) : (coverStatus = s); };
      var preview = document.getElementById(kind + '-preview');
      var statusEl = document.getElementById(kind + '-status');
      var removeBtn = document.getElementById(kind + '-remove');
      var btnLbl = document.getElementById(kind + '-btn-label');

      hideError();
      if (!file) {
        if (kind === 'avatar') { avatarFile = null; preview.style.background = ''; preview.textContent = initial(); }
        else { coverFile = null; preview.style.background = ''; preview.innerHTML = '<span>Cover preview</span>'; }
        statusEl.textContent = kind === 'avatar' ? 'You can change this any time. Max 5\u00A0MB.' : 'Max 5\u00A0MB.';
        statusEl.classList.remove('ok');
        removeBtn.hidden = true;
        btnLbl.textContent = kind === 'avatar' ? 'Choose avatar' : 'Choose cover';
        setStatus('idle');
        return;
      }
      if (!file.type.startsWith('image/')) {
        setStatus('error'); showError('Please choose an image file (JPEG, PNG, WebP).'); return;
      }
      if (file.size > MAX_BYTES) {
        setStatus('error'); showError('Image is too large (' + (file.size / 1024 / 1024).toFixed(1) + ' MB). Max is 5 MB.'); return;
      }
      setStatus('processing');
      statusEl.classList.remove('ok');
      statusEl.innerHTML = '<span class="spinner" style="border-color:#888;border-top-color:transparent;"></span> Preparing ' + kind + '…';
      var url = URL.createObjectURL(file);
      var img = new Image();
      img.onload = function () {
        URL.revokeObjectURL(url);
        if (kind === 'avatar') {
          avatarFile = file;
          preview.style.background = 'center/cover url(' + URL.createObjectURL(file) + ')';
          preview.textContent = '';
        } else {
          coverFile = file;
          preview.style.background = 'center/cover url(' + URL.createObjectURL(file) + ')';
          preview.innerHTML = '';
        }
        setStatus('ready');
        statusEl.classList.add('ok');
        statusEl.textContent = '✓ ' + kind.charAt(0).toUpperCase() + kind.slice(1) + ' ready';
        removeBtn.hidden = false;
        btnLbl.textContent = kind === 'avatar' ? 'Change avatar' : 'Change cover';
      };
      img.onerror = function () {
        URL.revokeObjectURL(url);
        setStatus('error');
        showError('That image could not be read. Try a different file.');
        input.value = '';
      };
      img.src = url;
    }
    function initial() {
      var n = (document.getElementById('nickname').value || document.getElementById('user').value || '?').trim();
      return (n.replace(/^@/, '').charAt(0) || '?').toUpperCase();
    }
    document.getElementById('avatar-input').addEventListener('change', function (e) { pickImage(e.target, 'avatar'); });
    document.getElementById('cover-input').addEventListener('change',  function (e) { pickImage(e.target, 'cover');  });
    document.getElementById('avatar-remove').addEventListener('click', function () {
      var inp = document.getElementById('avatar-input'); inp.value = ''; pickImage(inp, 'avatar');
    });
    document.getElementById('cover-remove').addEventListener('click', function () {
      var inp = document.getElementById('cover-input'); inp.value = ''; pickImage(inp, 'cover');
    });

    // ---- Step machine ----
    function showStep(i) {
      step = Math.max(0, Math.min(TOTAL_STEPS - 1, i));
      document.querySelectorAll('section[data-step]').forEach(function (sec) {
        sec.hidden = parseInt(sec.dataset.step, 10) !== step;
      });
      bars.forEach(function (b, k) { b.classList.toggle('active', k <= step); });
      lbls.forEach(function (l, k) { l.classList.toggle('active', k === step); });
      subtitle.textContent = 'Step ' + (step + 1) + ' of ' + TOTAL_STEPS + ' — ' + STEP_TITLES[step];

      btnBack.disabled = (step === 0);
      var isLast = step === TOTAL_STEPS - 1;
      btnNext.hidden = isLast;
      btnSub.hidden  = !isLast;
      hideError();

      if (step === 2) { renderCountries(''); tryDetectCountry(); }
      if (step === 3) { var ap = document.getElementById('avatar-preview'); if (!avatarFile) ap.textContent = initial(); }
    }
    function validateStep(s) {
      if (s === 0) {
        var u = document.getElementById('user').value.trim();
        var em = document.getElementById('email').value.trim();
        var pw = document.getElementById('pass').value;
        var cp = document.getElementById('confirmPass').value;
        if (!u || u.length < 3) return 'Username must be at least 3 characters.';
        if (!em || !/^\S+@\S+\.\S+$/.test(em)) return 'Enter a valid email address.';
        var pErr = validatePassword(pw); if (pErr) return pErr;
        if (pw !== cp) return 'Passwords do not match.';
      }
      if (s === 1) {
        var nick = document.getElementById('nickname').value;
        if (nick && nick.length > 50) return 'Nickname is too long.';
      }
      if (s === 2) {
        var d = document.getElementById('dob').value;
        if (d && !/^\d{4}-\d{2}-\d{2}$/.test(d)) return 'Invalid date.';
      }
      if (s === 3) {
        if (avatarStatus === 'processing') return 'Hang on — we\u2019re still preparing your avatar.';
        if (avatarStatus === 'error')      return 'Please pick a valid avatar image, or remove it to skip.';
      }
      if (s === 4) {
        if (coverStatus === 'processing') return 'Hang on — we\u2019re still preparing your cover photo.';
        if (coverStatus === 'error')      return 'Please pick a valid cover image, or remove it to skip.';
      }
      return '';
    }
    function showError(msg) { errorText.textContent = msg; errorBox.style.display = 'flex'; }
    function hideError()    { errorBox.style.display = 'none'; errorText.textContent = ''; }

    btnBack.addEventListener('click', function () { showStep(step - 1); });
    btnNext.addEventListener('click', function () {
      var v = validateStep(step);
      if (v) { showError(v); return; }
      showStep(step + 1);
    });

    // ---- Submit ----
    function setLoading(on) {
      btnSub.disabled = on;
      if (on) subLbl.innerHTML = '<span class="spinner"></span> Creating…';
      else subLbl.textContent = (coverFile && coverStatus === 'ready') ? 'Create Account' : 'Skip & Create Account';
    }
    form.addEventListener('submit', async function (e) {
      e.preventDefault();
      // Validate every step we've passed through, jump back to first failure.
      for (var i = 0; i <= step; i++) {
        var err = validateStep(i);
        if (err) { showError(err); showStep(i); return; }
      }
      setLoading(true);
      try {
        // Helper: convert a File → RpcFile { bytes, name, type } for the
        // auth.register RPC handler (which forwards via postBackendForm).
        async function toRpcFile(f) {
          if (!f) return undefined;
          var buf = await f.arrayBuffer();
          return { bytes: new Uint8Array(buf), name: f.name, type: f.type || 'application/octet-stream' };
        }
        var nick = document.getElementById('nickname').value;
        var payload = {
          user:     document.getElementById('user').value.trim(),
          pass:     document.getElementById('pass').value,
          email:    document.getElementById('email').value.trim().toLowerCase(),
          nickname: nick || document.getElementById('user').value.trim(),
          bio:      document.getElementById('bio').value,
          dob:      document.getElementById('dob').value,
          country:  countryHidden.value || countrySearch.value,
          host:     window.location.origin,
        };
        var av = await toRpcFile(avatarFile);
        var cv = await toRpcFile(coverFile);
        if (av) payload.avatar = av;
        if (cv) payload.cover  = cv;

        var data = await window.ExoRPC.call('auth.register', payload, { timeoutMs: 60000 });
        if (!data || data.success === false) {
          throw new Error((data && data.message) || 'Registration failed.');
        }
        // Stash a pending verification context for the verify-pending page.
        try {
          sessionStorage.setItem('exo_pending_verify', JSON.stringify({
            email:    data.email    || document.getElementById('email').value.trim().toLowerCase(),
            nickname: data.nickname || nick || document.getElementById('user').value.trim(),
            username: data.username,
          }));
        } catch (_) {}
        var em = document.getElementById('email').value.trim().toLowerCase();
        window.location.href = '/exocore/verify-pending?email=' + encodeURIComponent(em);
      } catch (err) {
        showError((err && err.message) || 'Registration failed. Please try again.');
        setLoading(false);
      }
    });

    // ---- Boot ----
    showStep(0);
    } /* end boot() */
  })();
</script>
</body>
</html>
