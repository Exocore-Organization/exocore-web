<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title class="notranslate" translate="no">Recover account · Exocore</title>
<link rel="icon" type="image/png" href="/exocore/exo-icon.png">
<!-- Per-theme structural visual overlays (scoped to html[data-theme="<id>"]). -->
<link rel="stylesheet" href="/exocore/_shared/exo-theme-skins.css">
<script>
/* Mobile Minecraft fallback — pixel font unreadable at mobile scale. */
(function () {
    try {
        var isMobile = matchMedia && matchMedia('(max-width: 768px)').matches;
        var t = localStorage.getItem('exo:theme') || '';
        var skipped = sessionStorage.getItem('exo:mobile-theme-fallback') === '1';
        if (isMobile && !skipped && (t === 'minecraft' || t === 'minecraft-dark')) {
            localStorage.setItem('exo:theme', 'replit-dark');
            sessionStorage.setItem('exo:mobile-theme-fallback', '1');
        }
    } catch (_) {}
})();
/* Pre-paint theme bootstrap — stamps data-theme, restores CSS vars, handles Aero. */
(function () {
    try {
        var html = document.documentElement;
        var id = localStorage.getItem('exo:theme') || '';
        if (id) html.dataset.theme = id;
        try {
            var vars = JSON.parse(localStorage.getItem('exo:theme-vars') || 'null');
            if (vars) {
                var cs = vars['color-scheme'];
                if (cs) html.style.setProperty('color-scheme', cs);
                var keys = Object.keys(vars);
                for (var i = 0; i < keys.length; i++) {
                    var k = keys[i];
                    if (k !== 'color-scheme' && vars[k]) html.style.setProperty(k, vars[k]);
                }
            }
        } catch (_) {}
        if (['frutiger-aero'].indexOf(id) !== -1) {
            html.dataset.mode = 'aero';
            html.classList.add('exo-booting');
            var t = setTimeout(function () { html.classList.remove('exo-booting'); }, 500);
            var l = document.createElement('link');
            l.rel = 'stylesheet';
            l.href = '/exocore/_shared/exo-frutiger-aero.css';
            l.setAttribute('data-exo-aero', '1');
            l.onload = function () { clearTimeout(t); html.classList.remove('exo-booting'); };
            l.onerror = function () { clearTimeout(t); html.classList.remove('exo-booting'); };
            document.head.appendChild(l);
        }
    } catch (e) {
        try { document.documentElement.classList.remove('exo-booting'); } catch (_) {}
    }
})();
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<style>
          html.exo-booting body { visibility: hidden !important; }
:root {
    --font-ui:   'IBM Plex Sans', system-ui, sans-serif;
    --font-mono: 'IBM Plex Mono', monospace;
    /* See note in home.html — first-paint fallbacks only.
     * Accent wired to theme so the recover-account UI tracks
     * the picked theme. `--green` stays a real green because
     * it's the success state for "code sent / password reset
     * confirmed" toasts. */
    --bg-base:   #0a0a0a;
    --bg-surf:   #111;
    --text-pri:  #f0f0f0;
    --text-sec:  #a0a0a0;
    --text-mut:  #666;
    --yellow:    var(--accent, #FFE500);
    --green:     #43d473;
    --pink:      var(--accent, #FF2D78);
    --cyan:      var(--accent, #00D4FF);
    --red:       #ff5555;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: var(--font-ui); background: var(--bg-base); color: var(--text-pri);
    min-height: 100vh; overflow-x: hidden; line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  .auth-page {
    position: relative; min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 1.5rem; overflow: hidden;
  }
  .auth-glow {
    position: absolute; border-radius: 50%; filter: blur(120px); pointer-events: none; z-index: 0;
  }
  .auth-glow-1 { width: 420px; height: 420px; background: rgba(255,229,0,0.06); top: -120px; left: -100px; }
  .auth-glow-2 { width: 360px; height: 360px; background: rgba(0,212,255,0.05); bottom: -100px; right: -80px; }

  .auth-card {
    position: relative; z-index: 1; width: 100%; max-width: 440px;
    background: var(--bg-surf); border: 2px solid var(--border, #333);
    box-shadow: 6px 6px 0 0 var(--yellow); padding: 1.75rem;
    display: flex; flex-direction: column; gap: 1.25rem;
    animation: fadeUp 0.3s ease both;
  }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes spin   { to { transform: rotate(360deg); } }

  .auth-logo-text {
    font-size: 0.85rem; font-weight: 800; letter-spacing: 0.2em;
    color: var(--yellow); font-family: var(--font-mono); text-transform: uppercase;
  }
  .auth-title {
    font-size: 1.65rem; font-weight: 800; line-height: 1.15;
    letter-spacing: -0.01em; color: var(--text-pri);
  }
  .auth-subtitle {
    font-size: 0.9rem; color: var(--text-sec); margin-top: 0.35rem;
  }

  .form-stack { display: flex; flex-direction: column; gap: 1rem; }
  /* `display: flex` clobbers `[hidden] { display: none }`. Restore it
     so the second-step form actually stays hidden until requested. */
  [hidden] { display: none !important; }
  .field      { display: flex; flex-direction: column; gap: 0.3rem; }
  .field-label {
    font-size: 0.72rem; font-weight: 700; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--text-mut);
  }
  .field-input {
    width: 100%; background: var(--bg-base, #0a0a0a); border: 2px solid var(--border, #333);
    padding: 0.7rem 0.9rem; font-size: 0.9rem; color: var(--text-pri);
    outline: none; transition: 0.1s ease; font-family: var(--font-ui);
  }
  .field-input::placeholder { color: var(--text-muted, #444); }
  .field-input:hover  { border-color: #555; }
  .field-input:focus  { border-color: var(--yellow); box-shadow: 3px 3px 0 var(--yellow); }

  .otp-input {
    font-family: var(--font-mono); font-size: 1.35rem;
    letter-spacing: 0.4em; text-align: center;
  }

  .pass-wrap { position: relative; }
  .pass-wrap .field-input { padding-right: 2.6rem; }
  .pass-toggle {
    position: absolute; right: 0.5rem; top: 50%;
    transform: translateY(-50%); background: transparent; border: none;
    color: var(--text-mut); cursor: pointer; padding: 0.4rem;
    display: flex; align-items: center; justify-content: center;
  }
  .pass-toggle:hover { color: var(--yellow); }

  .form-error, .form-success {
    display: flex; align-items: center; gap: 8px;
    padding: 0.65rem 0.85rem; font-size: 0.82rem; font-weight: 600;
    border: 2px solid;
  }
  .form-error   { background: rgba(255, 60, 60, 0.08); border-color: #d44; color: #ff8a8a; }
  .form-success { background: rgba(67, 212, 115, 0.08); border-color: var(--green); color: var(--green); }

  .btn {
    width: 100%; display: inline-flex; align-items: center; justify-content: center;
    gap: 8px; padding: 0.85rem 1rem;
    font-size: 0.85rem; font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase;
    cursor: pointer; border: 2px solid #000; transition: 0.1s ease; font-family: var(--font-ui);
  }
  .btn-primary { background: var(--yellow); color: #000; box-shadow: 4px 4px 0 0 #000; }
  .btn-primary:hover:not(:disabled)  { transform: translate(-2px, -2px); box-shadow: 6px 6px 0 0 #000; }
  .btn-primary:active:not(:disabled) { transform: translate(2px, 2px);   box-shadow: 2px 2px 0 0 #000; }
  .btn-primary:disabled { opacity: 0.6; cursor: wait; }
  .btn-secondary {
    background: var(--bg-card, #1a1a1a); color: var(--text-pri); border-color: var(--border, #333);
  }
  .btn-secondary:hover:not(:disabled)  { border-color: var(--yellow); color: var(--yellow); }
  .btn-secondary:disabled { opacity: 0.5; cursor: not-allowed; }

  .resend-timer {
    text-align: center; font-size: 0.8rem; color: var(--text-mut);
  }
  .resend-timer strong {
    color: var(--cyan); font-family: var(--font-mono); font-weight: 700;
  }

  .spinner { width: 14px; height: 14px; border: 2px solid rgba(0,0,0,0.25); border-top-color: #000; border-radius: 50%; animation: spin 0.7s linear infinite; display: inline-block; }

  .auth-footer {
    padding-top: 1rem; margin-top: 0.25rem;
    border-top: 1px solid #222; text-align: center;
    color: var(--text-mut); font-size: 0.85rem;
  }
  .auth-footer a { color: var(--yellow); font-weight: 700; text-decoration: none; }
  .auth-footer a:hover { text-decoration: underline; }

  @media (max-width: 480px) {
    .auth-page { padding: 0; align-items: stretch; }
    .auth-card {
      max-width: 100%; min-height: 100vh;
      box-shadow: none; border: none; border-bottom: 4px solid var(--yellow);
      padding: 1.25rem;
    }
    .btn { padding: 1rem; min-height: 52px; }
  }
</style>
<script src="/exocore/_shared/vendor/msgpack.min.js"></script>
<!-- Phase 3.M: ExoStorage loads first (see other auth pages). -->
<script src="/exocore/_shared/exo-storage.js"></script>
<script src="/exocore/_shared/exo-rpc.js"></script>
<script src="/exocore/editor/scripts/themes.js"></script>
<script src="/exocore/_shared/exo-theme-apply.js"></script>
</head>
<body class="theme-modern">

<div class="auth-page">
  <div class="auth-glow auth-glow-1"></div>
  <div class="auth-glow auth-glow-2"></div>

  <div class="auth-card">
    <span class="auth-logo-text">EXOCORE</span>

    <div>
      <h1 class="auth-title" id="page-title">Recover account</h1>
      <p class="auth-subtitle" id="page-subtitle">Enter your email and we’ll send you a one-time code.</p>
    </div>

    <!-- Step A: Request OTP -->
    <form id="form-request" class="form-stack" novalidate>
      <div class="field">
        <label class="field-label" for="email">Email Address</label>
        <input id="email" name="email" class="field-input" type="email"
               placeholder="you@example.com" autocomplete="email" autofocus required />
      </div>

      <div id="err-request" class="form-error" style="display:none;">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" style="flex-shrink:0;"><circle cx="7" cy="7" r="6" stroke="currentColor" stroke-width="1.5"/><path d="M7 4v3M7 9.5v.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        <span id="err-request-text"></span>
      </div>

      <button id="btn-send" class="btn btn-primary" type="submit"><span id="lbl-send">Send OTP</span></button>
    </form>

    <!-- Step B: Reset password -->
    <form id="form-reset" class="form-stack" novalidate hidden>
      <div class="field">
        <label class="field-label" for="otp">6-Digit OTP</label>
        <input id="otp" name="otp" class="field-input otp-input" type="text"
               inputmode="numeric" pattern="[0-9]*" maxlength="6"
               placeholder="000000" autofocus required />
      </div>

      <div class="field">
        <label class="field-label" for="newPass">New Password</label>
        <div class="pass-wrap">
          <input id="newPass" name="newPass" class="field-input" type="password"
                 placeholder="Min. 6 characters" autocomplete="new-password" required />
          <button type="button" class="pass-toggle" id="pass-toggle" aria-label="Show password" tabindex="-1">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <div id="ok-reset" class="form-success" style="display:none;">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" style="flex-shrink:0;"><circle cx="7" cy="7" r="6" stroke="currentColor" stroke-width="1.5"/><path d="M4.5 7l2 2 3-3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span id="ok-reset-text"></span>
      </div>

      <div id="err-reset" class="form-error" style="display:none;">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" style="flex-shrink:0;"><circle cx="7" cy="7" r="6" stroke="currentColor" stroke-width="1.5"/><path d="M7 4v3M7 9.5v.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        <span id="err-reset-text"></span>
      </div>

      <button id="btn-reset" class="btn btn-primary" type="submit"><span id="lbl-reset">Reset Password</span></button>

      <button id="btn-change-email" class="btn btn-secondary" type="button">← Use different email</button>

      <p class="resend-timer" id="resend-row" hidden>
        Resend OTP in <strong id="resend-secs">180s</strong>
      </p>
    </form>

    <div class="auth-footer">
      <a href="/exocore/login">← Back to sign in</a>
    </div>
  </div>
</div>

<script>
  (function () {
    /* Phase 3.M: wait for the IDB cache hydrate before we touch
     * theme / token / settings keys. */
    window.ExoStorage.ready.then(function () { boot(); });

    function boot() {
    // ---- Theme + already-logged-in redirect ----
    try {
      var settings = JSON.parse(ExoStorage.getItem('exo_settings') || '{}');
      if (!settings.theme) {
        settings.theme = 'modern';
        ExoStorage.setItem('exo_settings', JSON.stringify(settings));
      }
      document.body.className = 'theme-' + (settings.theme || 'modern');
      if (ExoStorage.getItem('exo_token')) {
        window.location.replace('/exocore/dashboard');
        return;
      }
    } catch (e) { console.error('init failed:', e); }

    var pageTitle    = document.getElementById('page-title');
    var pageSubtitle = document.getElementById('page-subtitle');
    var formRequest  = document.getElementById('form-request');
    var formReset    = document.getElementById('form-reset');
    var emailInput   = document.getElementById('email');
    var otpInput     = document.getElementById('otp');
    var newPassInput = document.getElementById('newPass');
    var btnSend      = document.getElementById('btn-send');
    var btnReset     = document.getElementById('btn-reset');
    var btnChange    = document.getElementById('btn-change-email');
    var lblSend      = document.getElementById('lbl-send');
    var lblReset     = document.getElementById('lbl-reset');
    var errReq       = document.getElementById('err-request');
    var errReqText   = document.getElementById('err-request-text');
    var errRes       = document.getElementById('err-reset');
    var errResText   = document.getElementById('err-reset-text');
    var okRes        = document.getElementById('ok-reset');
    var okResText    = document.getElementById('ok-reset-text');
    var resendRow    = document.getElementById('resend-row');
    var resendSecs   = document.getElementById('resend-secs');

    var resendTimer = 0;
    var resendInt   = 0;

    function startResendCountdown(seconds) {
      resendTimer = seconds;
      resendRow.hidden = false;
      resendSecs.textContent = resendTimer + 's';
      clearInterval(resendInt);
      resendInt = setInterval(function () {
        resendTimer--;
        if (resendTimer <= 0) {
          clearInterval(resendInt);
          resendRow.hidden = true;
          return;
        }
        resendSecs.textContent = resendTimer + 's';
      }, 1000);
    }

    // ---- Password show/hide ----
    var passToggle = document.getElementById('pass-toggle');
    passToggle.addEventListener('click', function () {
      var hidden = newPassInput.type === 'password';
      newPassInput.type = hidden ? 'text' : 'password';
      passToggle.style.color = hidden ? 'var(--yellow)' : '';
    });

    // ---- OTP: digits only ----
    otpInput.addEventListener('input', function () {
      otpInput.value = otpInput.value.replace(/\D/g, '').slice(0, 6);
    });

    function gotoStep(s) {
      if (s === 'request') {
        pageTitle.textContent = 'Recover account';
        pageSubtitle.textContent = 'Enter your email and we’ll send you a one-time code.';
        formRequest.hidden = false; formReset.hidden = true;
        clearInterval(resendInt); resendRow.hidden = true;
      } else {
        pageTitle.textContent = 'Reset password';
        pageSubtitle.textContent = 'We sent a 6-digit code to ' + emailInput.value;
        formRequest.hidden = true; formReset.hidden = false;
        otpInput.focus();
      }
    }
    function showErr(box, txt, msg) { txt.textContent = msg; box.style.display = 'flex'; }
    function hideErr(box, txt)      { box.style.display = 'none'; txt.textContent = ''; }
    function showOk(box, txt, msg)  { txt.textContent = msg; box.style.display = 'flex'; }
    function hideOk(box, txt)       { box.style.display = 'none'; txt.textContent = ''; }

    // ---- Send OTP ----
    formRequest.addEventListener('submit', async function (e) {
      e.preventDefault();
      hideErr(errReq, errReqText);
      var email = emailInput.value.trim();
      if (!email) { showErr(errReq, errReqText, 'Please enter your email address.'); return; }

      btnSend.disabled = true;
      lblSend.innerHTML = '<span class="spinner"></span> Sending OTP…';
      try {
        var data = await window.ExoRPC.call('auth.forgot.request', { email: email });
        if (!data || data.success === false) {
          throw new Error((data && data.message) || 'Failed to send OTP. Please try again.');
        }
        gotoStep('reset');
        showOk(okRes, okResText, 'OTP sent! Keep refreshing your inbox — delivery may take a minute or two.');
        startResendCountdown(180);
      } catch (err) {
        showErr(errReq, errReqText, (err && err.message) || 'Failed to send OTP. Please try again.');
      } finally {
        btnSend.disabled = false;
        lblSend.textContent = 'Send OTP';
      }
    });

    // ---- Reset password ----
    formReset.addEventListener('submit', async function (e) {
      e.preventDefault();
      hideErr(errRes, errResText);
      hideOk(okRes, okResText);

      var otp = otpInput.value.trim();
      var pw  = newPassInput.value;
      if (!otp)            { showErr(errRes, errResText, 'Please enter the OTP.'); return; }
      if (!pw)             { showErr(errRes, errResText, 'Please enter a new password.'); return; }
      if (pw.length < 6)   { showErr(errRes, errResText, 'Password must be at least 6 characters.'); return; }

      btnReset.disabled = true;
      lblReset.innerHTML = '<span class="spinner"></span> Resetting…';
      try {
        var data = await window.ExoRPC.call('auth.forgot.reset', {
          email: emailInput.value.trim(),
          otp:   otp,
          pass:  pw,
        });
        if (!data || data.success === false) {
          throw new Error((data && data.message) || 'Invalid OTP or request expired.');
        }
        showOk(okRes, okResText, 'Password updated! Redirecting to login…');
        setTimeout(function () { window.location.href = '/exocore/login'; }, 1800);
      } catch (err) {
        showErr(errRes, errResText, (err && err.message) || 'Invalid OTP or request expired.');
      } finally {
        btnReset.disabled = false;
        lblReset.textContent = 'Reset Password';
      }
    });

    btnChange.addEventListener('click', function () {
      hideErr(errRes, errResText); hideOk(okRes, okResText);
      otpInput.value = ''; newPassInput.value = '';
      gotoStep('request');
      emailInput.focus();
    });
    } /* end boot() */
  })();
</script>
</body>
</html>
