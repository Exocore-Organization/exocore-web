<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <rect width="64" height="64" rx="14" fill="#0a1020"/>
  <rect width="64" height="64" rx="14" fill="#00a1ff" fill-opacity="0.10"/>
  <!-- Folder root -->
  <rect x="8" y="14" width="18" height="12" rx="3" fill="#00a1ff" fill-opacity="0.25" stroke="#00a1ff" stroke-width="1.5"/>
  <!-- Tree lines -->
  <line x1="17" y1="26" x2="17" y2="52" stroke="#00a1ff" stroke-width="1.5" stroke-opacity="0.4"/>
  <!-- Branch 1 -->
  <line x1="17" y1="33" x2="26" y2="33" stroke="#00a1ff" stroke-width="1.5" stroke-opacity="0.4"/>
  <rect x="26" y="29" width="14" height="8" rx="2" fill="#00a1ff" fill-opacity="0.18" stroke="#00a1ff" stroke-width="1.2"/>
  <!-- Branch 2 -->
  <line x1="17" y1="45" x2="26" y2="45" stroke="#00a1ff" stroke-width="1.5" stroke-opacity="0.4"/>
  <rect x="26" y="41" width="14" height="8" rx="2" fill="#00a1ff" fill-opacity="0.18" stroke="#00a1ff" stroke-width="1.2"/>
  <!-- Branch 2 sub -->
  <line x1="33" y1="49" x2="33" y2="56" stroke="#00a1ff" stroke-width="1.2" stroke-opacity="0.35"/>
  <line x1="33" y1="56" x2="40" y2="56" stroke="#00a1ff" stroke-width="1.2" stroke-opacity="0.35"/>
  <rect x="40" y="53" width="12" height="6" rx="2" fill="#00a1ff" fill-opacity="0.14" stroke="#00a1ff" stroke-width="1"/>
  <!-- Search magnifier overlay -->
  <circle cx="49" cy="18" r="8" fill="#0a1020" stroke="#ffd400" stroke-width="2.2"/>
  <circle cx="49" cy="18" r="4.5" fill="none" stroke="#ffd400" stroke-width="1.8"/>
  <line x1="55" y1="24" x2="59" y2="28" stroke="#ffd400" stroke-width="2.2" stroke-linecap="round"/>
</svg>
